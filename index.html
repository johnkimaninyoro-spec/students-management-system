<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mara Christian High School - Complete Management System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
--primary: #1a5276;
--primary-light: #2e86c1;
--primary-dark: #154360;
--secondary: #27ae60;
--danger: #e74c3c;
--warning: #f39c12;
--info: #3498db;
--light: #ecf0f1;
--dark: #2c3e50;
--white: #ffffff;
--gray: #95a5a6;
--shadow: 0 4px 20px rgba(0,0,0,0.1);
--shadow-hover: 0 8px 30px rgba(0,0,0,0.15);
--radius: 12px;
--transition: all 0.3s ease;
}
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: var(--dark); line-height: 1.6; }
.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
gap: 8px;
margin-bottom: 12px;
}
.stat-card {
background: var(--white);
border-radius: 6px;
padding: 8px 6px;
box-shadow: 0 1px 4px rgba(0,0,0,0.08);
text-align: center;
border-top: 3px solid var(--primary-light);
cursor: pointer;
transition: all 0.3s ease;
position: relative;
overflow: hidden;
}
.stat-card:hover {
transform: translateY(-3px);
box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}
.stat-card:active {
transform: scale(0.95);
}
.stat-card .stat-number {
font-size: 1.4em;
font-weight: 700;
color: var(--primary);
line-height: 1.2;
}
.stat-card .stat-label {
color: var(--gray);
font-size: 0.6em;
margin-top: 2px;
line-height: 1.2;
}
.stat-card .click-hint {
font-size: 0.5em;
color: #bbb;
margin-top: 3px;
opacity: 0;
transition: opacity 0.3s;
}
.stat-card:hover .click-hint {
opacity: 1;
}
.stat-card .stat-icon {
font-size: 1.2em;
display: block;
margin-bottom: 2px;
}
.stat-card.active-filter {
background: #d6eaf8 !important;
border-color: #2e86c1 !important;
}
.stat-card.active-filter .filter-badge {
display: inline-block;
}
.filter-badge {
display: none;
position: absolute;
bottom: 2px;
right: 4px;
font-size: 0.4em;
background: var(--primary-light);
color: white;
padding: 1px 6px;
border-radius: 10px;
}
.filter-clear-btn {
margin-left: 10px;
font-size: 0.7em;
padding: 2px 10px;
border-radius: 12px;
background: #e74c3c;
color: white;
border: none;
cursor: pointer;
}
.filter-clear-btn:hover {
background: #c0392b;
}
.badge { padding: 2px 10px; border-radius: 20px; font-size: 0.7em; font-weight: 600; display: inline-block; }
.badge-success { background: #d5f5e3; color: #27ae60; }
.badge-danger { background: #fadbd8; color: #e74c3c; }
.badge-warning { background: #fdebd0; color: #f39c12; }
.badge-info { background: #d6eaf8; color: #2e86c1; }
.badge-primary { background: #d6eaf8; color: #1a5276; }
.badge-gold { background: #f9e79f; color: #8e6b00; }
.badge-purple { background: #e8daef; color: #8e44ad; }
.badge-pending { background: #fdebd0; color: #f39c12; }
.badge-approved { background: #d5f5e3; color: #27ae60; }
.badge-rejected { background: #fadbd8; color: #e74c3c; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 500; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--primary-light); color: white; }
.btn-primary:hover { background: var(--primary); transform: translateY(-1px); box-shadow: 0 4px 15px rgba(46, 134, 193, 0.3); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #c0392b; }
.btn-sm { padding: 4px 12px; font-size: 0.75em; }
.toast-container { position: fixed; top: 80px; right: 20px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
.toast { padding: 14px 24px; border-radius: 8px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); animation: slideIn 0.4s ease; font-size: 0.9em; max-width: 400px; }
@keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
.toast.success { background: var(--secondary); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--info); }
.toast.warning { background: var(--warning); }
</style>
</head>
<body>
<div class="stats-grid" id="dashboardStats"></div>
<div id="filterBadge" style="display:none;margin:10px 0;">
<span class="badge badge-info" id="activeFilterLabel"></span>
<button class="filter-clear-btn" onclick="clearStudentFilter()">✕ Clear Filter</button>
</div>
<div id="dataTable"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
// Sample data for demonstration
let studentsCache = [
{ id: '1', admNo: '2024-001', firstName: 'John', lastName: 'Doe', class: 'Grade 7 East', gender: 'Male', status: 'Boarder' },
{ id: '2', admNo: '2024-002', firstName: 'Jane', lastName: 'Smith', class: 'Grade 7 West', gender: 'Female', status: 'Day Scholar' },
{ id: '3', admNo: '2024-003', firstName: 'Michael', lastName: 'Johnson', class: 'Grade 8 East', gender: 'Male', status: 'Boarder' },
{ id: '4', admNo: '2024-004', firstName: 'Sarah', lastName: 'Williams', class: 'Grade 8 West', gender: 'Female', status: 'Boarder' },
{ id: '5', admNo: '2024-005', firstName: 'David', lastName: 'Brown', class: 'Grade 9 East', gender: 'Male', status: 'Day Scholar' },
];

let warningsCache = [
{ id: '1', studentId: '1', date: '2024-01-15', reason: 'Late submission' },
{ id: '2', studentId: '2', date: '2024-01-16', reason: 'Uniform violation' },
];

let suspensionsCache = [
{ id: '1', studentId: '3', date: '2024-01-10', reason: 'Fighting', duration: '3 days' },
];

let expulsionsCache = [];
let clinicCache = [
{ id: '1', studentId: '1', date: '2024-01-12', complaint: 'Headache' },
];

let prefectsCache = [
{ id: '1', studentId: '1', role: 'Head Prefect', department: 'Academics' },
{ id: '2', studentId: '2', role: 'Class Prefect', department: 'Discipline' },
];

let attendanceCache = [
{ id: '1', studentId: '1', date: new Date().toISOString().split('T')[0], status: 'Present' },
{ id: '2', studentId: '2', date: new Date().toISOString().split('T')[0], status: 'Present' },
{ id: '3', studentId: '3', date: new Date().toISOString().split('T')[0], status: 'Absent' },
];

let gradesCache = [
{ id: '1', studentId: '1', subject: 'Mathematics', test1: 20, test2: 22, test3: 18, exam: 45 },
{ id: '2', studentId: '2', subject: 'English', test1: 18, test2: 20, test3: 16, exam: 40 },
];

let maintenanceCache = [
{ id: '1', class: 'Grade 7 East', status: 'Pending', description: 'Broken window' },
];

let pendingRegistrationsCache = [
{ id: '1', email: 'teacher@test.com', fullName: 'Test Teacher', status: 'pending' },
];

// Student filter state
let studentFilter = {
status: '',
gender: '',
class: ''
};

function showToast(message, type = 'success', duration = 3000) {
const container = document.getElementById('toastContainer');
const toast = document.createElement('div');
toast.className = `toast ${type}`;
toast.textContent = message;
container.appendChild(toast);
setTimeout(() => {
toast.style.opacity = '0';
toast.style.transform = 'translateX(100%)';
setTimeout(() => toast.remove(), 400);
}, duration);
}

function renderDashboard() {
const students = studentsCache;
const total = students.length;
const male = students.filter(s => s.gender === 'Male').length;
const female = students.filter(s => s.gender === 'Female').length;
const boarders = students.filter(s => s.status === 'Boarder').length;
const dayScholars = students.filter(s => s.status === 'Day Scholar').length;
const today = new Date().toISOString().split('T')[0];
const presentToday = attendanceCache.filter(a => a.date === today && a.status === 'Present').length;
const avgGrade = gradesCache.length ? Math.round(gradesCache.reduce((sum, g) => sum + (g.test1 || 0) + (g.test2 || 0) + (g.test3 || 0) + (g.exam || 0), 0) / gradesCache.length) : 0;
const sponsoredTotal = 0;
const prefectCount = students.filter(s => s.prefectRole).length;
const pendingMaintenance = maintenanceCache.filter(m => m.status === 'Pending').length;

document.getElementById('dashboardStats').innerHTML = `
<div class="stat-card" onclick="navigateToTab('Total Students')" data-tab="students">
<span class="stat-icon">👩‍🎓</span>
<div class="stat-number">${total}</div>
<div class="stat-label">Total Students</div>
<div class="click-hint">Click to view all</div>
</div>
<div class="stat-card" style="border-top-color:#3498db;" onclick="navigateToTab('Boys')" data-tab="students">
<span class="stat-icon">👦</span>
<div class="stat-number">${male}</div>
<div class="stat-label">Boys</div>
<div class="click-hint">All boys</div>
</div>
<div class="stat-card" style="border-top-color:#e91e8c;" onclick="navigateToTab('Girls')" data-tab="students">
<span class="stat-icon">👧</span>
<div class="stat-number">${female}</div>
<div class="stat-label">Girls</div>
<div class="click-hint">All girls</div>
</div>
<div class="stat-card" style="border-top-color:#27ae60;" onclick="navigateToTab('Present Today')" data-tab="attendance">
<span class="stat-icon">✅</span>
<div class="stat-number">${presentToday}</div>
<div class="stat-label">Present Today</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#2e86c1;" onclick="navigateToTab('Avg Grade')" data-tab="grades">
<span class="stat-icon">📊</span>
<div class="stat-number">${avgGrade}%</div>
<div class="stat-label">Avg Grade</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#f39c12;" onclick="navigateToTab('Warnings')" data-tab="warnings">
<span class="stat-icon">⚠️</span>
<div class="stat-number">${warningsCache.length}</div>
<div class="stat-label">Warnings</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#e74c3c;" onclick="navigateToTab('Suspensions')" data-tab="suspensions">
<span class="stat-icon">🚫</span>
<div class="stat-number">${suspensionsCache.length}</div>
<div class="stat-label">Suspensions</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#c0392b;" onclick="navigateToTab('Expulsions')" data-tab="expulsions">
<span class="stat-icon">❌</span>
<div class="stat-number">${expulsionsCache.length}</div>
<div class="stat-label">Expulsions</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#8e44ad;" onclick="navigateToTab('Clinic Visits')" data-tab="clinic">
<span class="stat-icon">🏥</span>
<div class="stat-number">${clinicCache.length}</div>
<div class="stat-label">Clinic Visits</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#9b59b6;" onclick="navigateToTab('Prefects')" data-tab="prefects">
<span class="stat-icon">⭐</span>
<div class="stat-number">${prefectCount}</div>
<div class="stat-label">Prefects</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#27ae60;" onclick="navigateToTab('Boarders')" data-tab="students">
<span class="stat-icon">🏠</span>
<div class="stat-number">${boarders}</div>
<div class="stat-label">Boarders</div>
<div class="click-hint">All boarders</div>
</div>
<div class="stat-card" style="border-top-color:#f39c12;" onclick="navigateToTab('Day Scholars')" data-tab="students">
<span class="stat-icon">🚶</span>
<div class="stat-number">${dayScholars}</div>
<div class="stat-label">Day Scholars</div>
<div class="click-hint">All day scholars</div>
</div>
<div class="stat-card" style="border-top-color:#e67e22;" onclick="navigateToTab('Pending Maintenance')" data-tab="maintenance">
<span class="stat-icon">🔧</span>
<div class="stat-number">${pendingMaintenance}</div>
<div class="stat-label">Pending Maintenance</div>
<div class="click-hint">Click to view</div>
</div>
<div class="stat-card" style="border-top-color:#f39c12;" onclick="navigateToTab('Pending Approvals')" data-tab="registrations">
<span class="stat-icon">📝</span>
<div class="stat-number">${pendingRegistrationsCache.filter(r => r.status === 'pending').length}</div>
<div class="stat-label">Pending Approvals</div>
<div class="click-hint">Click to view</div>
</div>
`;
}

// Card actions mapping
const cardActions = {
'Total Students': { tab: 'students', filter: null, label: null },
'Boys': { tab: 'students', filter: { type: 'gender', value: 'Male' }, label: '👦 Boys' },
'Girls': { tab: 'students', filter: { type: 'gender', value: 'Female' }, label: '👧 Girls' },
'Present Today': { tab: 'attendance', filter: null, label: null },
'Avg Grade': { tab: 'grades', filter: null, label: null },
'Warnings': { tab: 'warnings', filter: null, label: null },
'Suspensions': { tab: 'suspensions', filter: null, label: null },
'Expulsions': { tab: 'expulsions', filter: null, label: null },
'Clinic Visits': { tab: 'clinic', filter: null, label: null },
'Prefects': { tab: 'prefects', filter: null, label: null },
'Boarders': { tab: 'students', filter: { type: 'status', value: 'Boarder' }, label: '🏠 Boarders' },
'Day Scholars': { tab: 'students', filter: { type: 'status', value: 'Day Scholar' }, label: '🚶 Day Scholars' },
'Pending Maintenance': { tab: 'maintenance', filter: null, label: null },
'Pending Approvals': { tab: 'registrations', filter: null, label: null }
};

// Navigate to tab with optional filter
window.navigateToTab = function(label) {
const action = cardActions[label];
if (!action) {
showToast('⚠️ No data view for this card', 'warning');
return;
}

// Apply filter if needed
if (action.filter && action.tab === 'students') {
applyStudentFilter(action.filter.type, action.filter.value, action.label);
} else if (action.tab === 'students') {
clearStudentFilter();
}

// Show the data
showTabData(action.tab);
showToast(`📊 Viewing: ${label}`, 'info');
};

// Apply student filter
function applyStudentFilter(filterType, filterValue, filterLabel) {
if (filterType === 'status') {
studentFilter.status = filterValue;
} else if (filterType === 'gender') {
studentFilter.gender = filterValue;
}

const filterBadge = document.getElementById('filterBadge');
const filterLabelEl = document.getElementById('activeFilterLabel');

if (filterValue) {
filterBadge.style.display = 'inline-block';
filterLabelEl.textContent = filterLabel || filterValue;
} else {
filterBadge.style.display = 'none';
}

showTabData('students');
}

// Clear student filter
window.clearStudentFilter = function() {
studentFilter = { status: '', gender: '', class: '' };
document.getElementById('filterBadge').style.display = 'none';
showTabData('students');
showToast('✅ Filter cleared', 'info');
};

// Show data for specific tab
function showTabData(tab) {
const dataTable = document.getElementById('dataTable');

switch(tab) {
case 'students':
renderStudentsTable();
break;
case 'attendance':
renderAttendanceTable();
break;
case 'grades':
renderGradesTable();
break;
case 'warnings':
renderWarningsTable();
break;
case 'suspensions':
renderSuspensionsTable();
break;
case 'expulsions':
renderExpulsionsTable();
break;
case 'clinic':
renderClinicTable();
break;
case 'prefects':
renderPrefectsTable();
break;
case 'maintenance':
renderMaintenanceTable();
break;
case 'registrations':
renderRegistrationsTable();
break;
default:
dataTable.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">No data to display</p>';
}
}

// Render students table with filters
function renderStudentsTable() {
let filtered = studentsCache;

if (studentFilter.status) {
filtered = filtered.filter(s => s.status === studentFilter.status);
}
if (studentFilter.gender) {
filtered = filtered.filter(s => s.gender === studentFilter.gender);
}
if (studentFilter.class) {
filtered = filtered.filter(s => s.class === studentFilter.class);
}

const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">👩‍🎓 Student Records (${filtered.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Adm No.</th>
<th style="padding:10px;text-align:left;">Name</th>
<th style="padding:10px;text-align:left;">Class</th>
<th style="padding:10px;text-align:left;">Gender</th>
<th style="padding:10px;text-align:left;">Status</th>
</tr>
</thead>
<tbody>
${filtered.map(s => `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;"><strong>${s.admNo}</strong></td>
<td style="padding:8px;">${s.firstName} ${s.lastName}</td>
<td style="padding:8px;">${s.class}</td>
<td style="padding:8px;">${s.gender}</td>
<td style="padding:8px;"><span class="badge ${s.status === 'Boarder' ? 'badge-primary' : 'badge-warning'}">${s.status}</span></td>
</tr>
`).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

// Render other tables
function renderAttendanceTable() {
const today = new Date().toISOString().split('T')[0];
const filtered = attendanceCache.filter(a => a.date === today);
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">✅ Today's Attendance (${filtered.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Date</th>
<th style="padding:10px;text-align:left;">Student</th>
<th style="padding:10px;text-align:left;">Status</th>
</tr>
</thead>
<tbody>
${filtered.map(a => {
const student = studentsCache.find(s => s.id === a.studentId);
return `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;">${a.date}</td>
<td style="padding:8px;">${student ? student.firstName + ' ' + student.lastName : 'Unknown'}</td>
<td style="padding:8px;"><span class="badge ${a.status === 'Present' ? 'badge-success' : 'badge-danger'}">${a.status}</span></td>
</tr>
`;
}).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

function renderGradesTable() {
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">📝 Student Grades (${gradesCache.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Student</th>
<th style="padding:10px;text-align:left;">Subject</th>
<th style="padding:10px;text-align:left;">Total</th>
</tr>
</thead>
<tbody>
${gradesCache.map(g => {
const student = studentsCache.find(s => s.id === g.studentId);
const total = (g.test1 || 0) + (g.test2 || 0) + (g.test3 || 0) + (g.exam || 0);
return `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;">${student ? student.firstName + ' ' + student.lastName : 'Unknown'}</td>
<td style="padding:8px;">${g.subject}</td>
<td style="padding:8px;"><strong>${total}</strong></td>
</tr>
`;
}).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

function renderWarningsTable() {
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">⚠️ Warnings (${warningsCache.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Date</th>
<th style="padding:10px;text-align:left;">Student</th>
<th style="padding:10px;text-align:left;">Reason</th>
</tr>
</thead>
<tbody>
${warningsCache.map(w => {
const student = studentsCache.find(s => s.id === w.studentId);
return `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;">${w.date}</td>
<td style="padding:8px;">${student ? student.firstName + ' ' + student.lastName : 'Unknown'}</td>
<td style="padding:8px;">${w.reason}</td>
</tr>
`;
}).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

function renderSuspensionsTable() {
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">🚫 Suspensions (${suspensionsCache.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Date</th>
<th style="padding:10px;text-align:left;">Student</th>
<th style="padding:10px;text-align:left;">Reason</th>
<th style="padding:10px;text-align:left;">Duration</th>
</tr>
</thead>
<tbody>
${suspensionsCache.map(s => {
const student = studentsCache.find(st => st.id === s.studentId);
return `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;">${s.date}</td>
<td style="padding:8px;">${student ? student.firstName + ' ' + student.lastName : 'Unknown'}</td>
<td style="padding:8px;">${s.reason}</td>
<td style="padding:8px;">${s.duration}</td>
</tr>
`;
}).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

function renderExpulsionsTable() {
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">❌ Expulsions (${expulsionsCache.length})</h3>
<p style="text-align:center;color:#999;padding:20px;">No expulsions recorded</p>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

function renderClinicTable() {
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">🏥 Clinic Visits (${clinicCache.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Date</th>
<th style="padding:10px;text-align:left;">Student</th>
<th style="padding:10px;text-align:left;">Complaint</th>
</tr>
</thead>
<tbody>
${clinicCache.map(c => {
const student = studentsCache.find(s => s.id === c.studentId);
return `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;">${c.date}</td>
<td style="padding:8px;">${student ? student.firstName + ' ' + student.lastName : 'Unknown'}</td>
<td style="padding:8px;">${c.complaint}</td>
</tr>
`;
}).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

function renderMaintenanceTable() {
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">🔧 Maintenance Reports (${maintenanceCache.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Class</th>
<th style="padding:10px;text-align:left;">Description</th>
<th style="padding:10px;text-align:left;">Status</th>
</tr>
</thead>
<tbody>
${maintenanceCache.map(m => `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;">${m.class}</td>
<td style="padding:8px;">${m.description}</td>
<td style="padding:8px;"><span class="badge ${m.status === 'Pending' ? 'badge-danger' : 'badge-success'}">${m.status}</span></td>
</tr>
`).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}

function renderRegistrationsTable() {
const pending = pendingRegistrationsCache.filter(r => r.status === 'pending');
const html = `
<div style="background:white;padding:20px;border-radius:8px;margin-top:10px;">
<h3 style="margin-bottom:15px;color:#1a5276;">📝 Pending Registrations (${pending.length})</h3>
<table style="width:100%;border-collapse:collapse;font-size:0.85em;">
<thead>
<tr style="background:#1a5276;color:white;">
<th style="padding:10px;text-align:left;">Email</th>
<th style="padding:10px;text-align:left;">Name</th>
<th style="padding:10px;text-align:left;">Status</th>
</tr>
</thead>
<tbody>
${pending.map(r => `
<tr style="border-bottom:1px solid #eee;">
<td style="padding:8px;">${r.email}</td>
<td style="padding:8px;">${r.fullName}</td>
<td style="padding:8px;"><span class="badge badge-pending">⏳ Pending</span></td>
</tr>
`).join('')}
</tbody>
</table>
</div>
`;
document.getElementById('dataTable').innerHTML = html;
}
