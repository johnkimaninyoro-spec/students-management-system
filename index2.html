<!DOCTYPE html>
<html>
<head>
  <title>Firebase Login Test</title>
</head>
<body>
  <h1>Firebase Login Test</h1>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="testLogin()">Login</button>
  <div id="result"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ⚠️ REPLACE WITH YOUR REAL CONFIG
    const firebaseConfig = {
      apiKey: "YOUR_REAL_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.testLogin = async function() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = document.getElementById('result');
      
      result.textContent = '⏳ Logging in...';
      
      try {
        const user = await signInWithEmailAndPassword(auth, email, password);
        result.textContent = '✅ SUCCESS! Logged in as: ' + user.user.email;
        result.style.color = 'green';
      } catch(err) {
        result.textContent = '❌ ERROR: ' + err.code + ' - ' + err.message;
        result.style.color = 'red';
        console.error(err);
      }
    };
  </script>
</body>
</html>
